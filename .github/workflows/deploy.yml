name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ── Validate ────────────────────────────────────────────────────────────────
  # Vercel's own GitHub integration handles all deploys automatically.
  # This job just ensures the API file is syntactically valid before merging.
  validate:
    name: Validate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Check API syntax
        run: |
          node --check api/hormuz.js   && echo "api/hormuz.js OK"
          node --check api/live-data.js && echo "api/live-data.js OK"
          node --check api/news.js      && echo "api/news.js OK"

      - name: Smoke-test handler exports
        run: |
          node -e "
            ['api/hormuz.js','api/live-data.js','api/news.js'].forEach(function(f){
              var h = require('./'+f);
              if (typeof h !== 'function') { console.error(f+' bad export'); process.exit(1); }
              console.log(f+' handler OK');
            });
          "
