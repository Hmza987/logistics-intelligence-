name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ── Validate ────────────────────────────────────────────────────────────────
  # Vercel's own GitHub integration handles all deploys automatically.
  # This job just ensures the API file is syntactically valid before merging.
  validate:
    name: Validate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Check API syntax
        run: node --check api/hormuz.js && echo "api/hormuz.js OK"

      - name: Smoke-test handler export
        run: |
          node -e "
            const handler = require('./api/hormuz.js');
            if (typeof handler !== 'function') process.exit(1);
            console.log('handler export OK');
          "
