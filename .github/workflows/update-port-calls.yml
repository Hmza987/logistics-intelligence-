name: Update Port Call Data

on:
  schedule:
    # 09:00 UTC every Monday — IMF PortWatch updates Tuesdays; Monday run picks up prior week data
    - cron: '0 9 * * 1'
  workflow_dispatch:  # allow manual trigger from GitHub Actions UI

permissions:
  contents: write

jobs:
  update:
    name: Fetch IMF PortWatch → patch index.html
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Fetch port call data and patch index.html
        run: node scripts/fetch-port-calls.js

      - name: Check for changes
        id: diff
        run: |
          git diff --quiet && echo "changed=false" >> $GITHUB_OUTPUT || echo "changed=true" >> $GITHUB_OUTPUT

      - name: Commit and push
        if: steps.diff.outputs.changed == 'true'
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add index.html data/port_calls.json
          git commit -m "data: auto-update port calls $(date -u +%Y-%m-%d) [skip ci]"
          git push
